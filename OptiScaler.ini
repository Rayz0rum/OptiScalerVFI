; -------------------------------------------------------
[Suréchantillonnage]
; -------------------------------------------------------
; Sélectionnez la mise à l'échelle pour les jeux DX11
; fsr22 (DX11 natif), fsr31 (DX11), xess (DX11 natif, Arc uniquement), xess_12 (dx11sur12), fsr21_12 (dx11sur12), fsr22_12 (dx11sur12), fsr31_12 (dx11sur12, FSR4), dlss - Par défaut (auto) est fsr22
Dx11Upscaler=auto

; Sélectionnez la mise à l'échelle pour les jeux DX12
; xess, fsr21, fsr22, fsr31 (aussi pour FSR4), dlss - Par défaut (auto) est xess
Dx12Upscaler=auto

; Sélectionnez la Mise à l'échelle pour les jeux Vulkan
; fsr21 (VK natif), fsr22 (VK natif), fsr31 (VK natif), xess (VK natif), fsr21_12 (VKsur12), fsr31_12 (VKsur12, FSR4), dlss - Par défaut (auto) est fsr22
VulkanUpscaler=auto



; -------------------------------------------------------
[GI]
; -------------------------------------------------------
; Active la génération d'images
; true ou false - Par défaut (auto) est false
Enabled=auto

; Source/Entrée GI sélectionnée
; dlssg    - Peut être utilisé avec n'importe quelle sortie GI. Prend en charge sansATH nativement. Limité aux jeux qui utilisent Streamline v2 et gén. DLSS
; nukems   - Limité à FSR 3 FG. Nécessite DLSSG dans le jeu. Prend en charge sansATH nativement. Utilise le swapchain Streamline pour le pacing.
; fsrfg    - Peut être utilisé avec n'importe quelle sortie FG. Prend en charge sansATH nativement.
; upscaler - La mise à l'échelle doit être activée. Peut être utilisé avec n'importe quelle sortie GI, mais peut être imparfait avec certaines. Pour éviter les glitches d'IU, ATHclair est requis
; fsrfg30  - Peut être utilisé avec n'importe quelle sortie FG. Prend en charge sansATH nativement.
; nofg, dlssg, nukems, fsrfg, upscaler, fsrfg30 - Par défaut (auto) est nofg
FGInput=auto

; Sortie GI sélectionnée
; fsrfg  - nécessite amd_fidelityfx_dx12.dll ou amd_fidelityfx_loader_dx12.dll + amd_fidelityfx_framegeneration_dx12.dll
; xefg   - nécessite libxess_fg.dll, libxell.dll et le dernier dll fakenvapi
; nukems - nécessite dlssg_to_fsr3_amd_is_better.dll, les utilisateurs AMD/Intel doivent aussi ajouter fakenvapi
; nofg, fsrfg, xefg, nukems - Par défaut (auto) est nofg
FGOutput=auto

; Source du temps de trame, affecte la cadence d'images
; 0 : Entrée (DLSSG/FSRFG/OptiFG) | 1 : Temps entre les appels Present | 2 : Zéro (Seulement pour XeFG)
; true ou false - Par défaut (auto) est 0
FTInput=auto

; Active la vue de débogage de la génération d'images
; true ou false - Par défaut (auto) est false
DebugView=auto

; Dessine l'IU au-dessus de la GI, nécessite sansATH et une texture UI, principalement pour FSR FG
; true ou false - Par défaut (auto) est false
DrawUIOverFG=auto

; Définit le type d'une texture UI fournie, avec DrawUIOverFG + FSR FG cela changera l'apparence de l'UI
; true ou false - Par défaut (auto) est true
UIPremultipliedAlpha=auto

; Contrôle Hudless, même si la source FG en fournit un
; true ou false - Par défaut (auto) est false
DisableHudless=auto

; Contrôle une texture UI, même si la source FG en fournit une
; true ou false - Par défaut (auto) est true
DisableUI=auto

; Ignore les signaux Reset provenant des entrées FG
; true ou false - Par défaut (auto) est false
SkipReset=auto

; Définit le rectangle FG
; valeur entière - Par défaut (auto) est tout l'écran
RectLeft=auto
RectTop=auto
RectWidth=auto
RectHeight=auto

; Nombre d'images que la Génération d'images est autorisée à devancer par rapport au jeu
; Peut empêcher l'activation/désactivation de la FG mais peut aussi causer des problèmes
; 1 à 3 - Par défaut (auto) est 1
AllowedFrameAhead=auto

; Toujours marquer Depth comme ValidNow
; Utilisera plus de VRAM mais nécessaire pour Uniscaler
; true ou false - Par défaut (auto) est false
DepthValidNow=auto

; Toujours marquer Velocity comme ValidNow
; Utilisera plus de VRAM mais nécessaire pour Uniscaler
; true ou false - Par défaut (auto) est false
VelocityValidNow=auto

; Toujours marquer Hudless comme ValidNow
; Utilisera plus de VRAM mais nécessaire pour Uniscaler
; true ou false - Par défaut (auto) est false
HudlessValidNow=auto

; Si la source tague plus d'un hudless n'en utiliser que le premier
; true ou false - Par défaut (auto) est false
OnlyAcceptFirstHudless=auto

; Préserver et empêcher la libération du swapchain FG
; Peut empêcher des crashs lors de la libération du swapchain
; true ou false - Par défaut (auto) est true
PreserveSwapChain=auto

; Ignorer l'appel ResizeBuffers sur le swapchain
; Si les anciennes et nouvelles descriptions sont identiques
; Empêche les crashs après les appels ResizeBuffers
; true ou false - Par défaut (auto) est true
SkipResizeBuffers=auto

; Normalement après ResizeBuffers les buffers du swapchain
; devraient être en état COMMON, quand cette option est activée
; OptiÉchelle essaiera de définir les états des buffers du swapchain
; lorsqu'on saute l'appel ResizeBuffers
; Peut causer ou résoudre des crashs
; true ou false - Par défaut (auto) est false
ModifyBufferState=auto

; Normalement après ResizeBuffers l'index courant du swapchain
; devrait être 0, quand cette option est activée
; OptiÉchelle essaiera de définir l'index du swapchain en appelant present
; jusqu'à ce que l'index atteigne 0
; Peut causer ou résoudre des crashs
; true ou false - Par défaut (auto) est true
ModifySCIndex=auto



; -------------------------------------------------------
[FSRFG]
; -------------------------------------------------------
; Active les lignes de déchirure (Tear Lines) de la Génération d'images FSR3.1
; true ou false - Par défaut (auto) est false
DebugTearLines=auto

; Active les lignes de saut d'interpolation de la Génération d'images FSR3.1
; true ou false - Par défaut (auto) est false
DebugResetLines=auto

; Active les lignes de pacing de la Génération d'images FSR3.1
; true ou false - Par défaut (auto) est false
DebugPacingLines=auto

; Active la Génération d'images asynchrone FSR3.1
; true ou false - Par défaut (auto) est false
AllowAsync=auto

; Active l'utilisation d'un mutex pour les appels present du swapchain FG
; Le désactiver peut améliorer les performances au prix de la stabilité
; true ou false - Par défaut (auto) est true
UseMutexForSwapchain=auto

; Réglage du pacing des images
; -------------------------------------------------------
; Active des paramètres personnalisés de réglage du pacing des images
; true ou false - Par défaut (auto) est true
FramePacingTuning=auto

; Cette info provient de :
; https://github.com/GPUOpen-LibrariesAndSDKs/FidelityFX-SDK/blob/54fbaafdc34716811751bea5032700e78f5a0f33/ffx-api/include/ffx_api/ffx_api_types.h#L197
;
; Réglage par défaut
; safetyMarginInMs==0.1ms et varianceFactor==0.1.
;
; Réglage A
; safetyMarginInMs==0.75ms, et varianceFactor==0.1.
;
; Réglage B
; safetyMarginInMs==0.01ms et varianceFactor==0.3.
;
; Si votre jeu, en utilisant la Génération d'images, tourne à un framerate anormalement bas après une transition graduelle d'une scène complexe à une scène simple,
; vous pouvez essayer de définir "Tuning Set B" pour récupérer des FPS perdus au prix d'une variance un peu plus élevée.
;
; OptiÉchelle utilisera Tuning B par défaut

; Réglage du pacing des images
; Définit la marge de sécurité
; float - Par défaut (auto) est 0.01
FPTSafetyMarginInMs=auto

; Réglage du pacing des images
; Définit le facteur de variance
; 0.0 - 1.0 - Par défaut (auto) est 0.3
FPTVarianceFactor=auto

; Réglage du pacing des images
; Permet au spinlock de pacing de dormir, devrait réduire l'utilisation CPU
; Peut causer une montée en FPS plus lente
; true ou false - Par défaut (auto) est false
FPTHybridSpin=auto

; Réglage du pacing des images
; Durée de spin si FPTHybridSpin est true. Mesuré en unités de résolution du timer.
; Non recommandé de descendre en dessous de 2. Provoquera des overshoots fréquents
; uint - Par défaut (auto) est 2
FPTHybridSpinTime=auto

; Réglage du pacing des images
; Permet WaitForSingleObject au lieu de spinning pour la valeur du fence
; true ou false - Par défaut (auto) est false
FPTWaitForSingleObjectOnFence=auto

; Active le Watermark FSR-FG Redstone
; true ou false - Par défaut (auto) est false
EnableWatermark=auto



; -------------------------------------------------------
[XeFG]
; -------------------------------------------------------
; Ignore les vérifications pré-ini pour XeFG
; Peut causer une mauvaise qualité d'image ou des crashs !
; true ou false - Par défaut (auto) est false
IgnoreInitChecks=auto

; Définit le nombre d'images interpolées (GMI)
; 1 = 2X | 2 = 3X | 3 = 4X
; true ou false - Par défaut (auto) est 1
InterpolationCount=auto

; Flag DepthInverted pour XeFG
; true ou false - Par défaut (auto) est false
DepthInverted=auto

; Désactive l'interpolation de l'UI
; Ne fonctionne que lorsque hudless est fourni
; true ou false - Par défaut (auto) est false
UIComposition=auto

; Flag JitteredMV pour XeFG
; true ou false - Par défaut (auto) est false
JitteredMV=auto

; Flag HighResMV pour XeFG
; true ou false - Par défaut (auto) est false
HighResMV=auto

; Active les carrés de débogage XeFG
; true ou false - Par défaut (auto) est false
DebugView=auto

; Force le mode Sans Bordures (Borderless) au lieu du plein écran exclusif
; Peut causer des problèmes de stabilité lors des changements de mode
; ou des problèmes de qualité d'image quand le plein écran exclusif est
; plus petit que la résolution d'affichage
; true ou false - Par défaut (auto) est false
ForceBorderless=auto



; -------------------------------------------------------
[OptiFG]
; -------------------------------------------------------

; Désactive le suivi HUDFix des ressources
; réduisant aussi la charge CPU lorsqu'utilisé avec
; des Générateurs d'images ML qui gèrent les éléments HUD
; true ou false - Par défaut (auto) est false
DisableHUDFix=auto

; Active le suivi Hudless HUDFix pour la Génération d'images
; Peut causer des crashs, surtout avec Async
; true ou false - Par défaut (auto) est false
HUDFix=auto

; Retarde la capture d'image HUDless
; Peut causer des crashs, surtout si réglé trop haut !
; valeur entière > 0 - Par défaut (auto) est 1
HUDLimit=auto

; Vérifications HUDless étendues pour plus de formats d'image
; Peut causer crashs et ralentissements.
; true ou false - Par défaut (auto) est false
HUDFixExtended=auto

; Ne pas utiliser CreateRenderTargetView pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableRTV=auto

; Ne pas utiliser CreateShaderResourceView pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableSRV=auto

; Ne pas utiliser CreateUnorderedAccessView pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableUAV=auto

; Ne pas utiliser OMSetRenderTargets pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableOM=auto

; Ne pas utiliser SetComputeRootDescriptorTable pour le suivi des ressources
; true ou false - Par défaut (auto) est true
HudfixDisableSCR=auto

; Ne pas utiliser SetGraphicsRootDescriptorTable pour le suivi des ressources
; true ou false - Par défaut (auto) est true
HudfixDisableSGR=auto

; Ne pas utiliser DrawInstanced pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableDI=auto

; Ne pas utiliser DrawIndexedInstanced pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableDII=auto

; Ne pas utiliser Dispatch pour le suivi des ressources
; true ou false - Par défaut (auto) est false
HudfixDisableDispatch=auto

; Empêche les buffers du swapchain d'être utilisés comme Hudless
; Peut aider à corriger des problèmes d'overlay mais peut réduire la compatibilité
; true ou false - Par défaut (auto) est false
HUDFixDontUseSwapchainBuffers=auto

; Relâche les vérifications de résolution pour Hudless de 32 pixels
; Aide les jeux qui utilisent des bordures noires pour certaines résolutions et ratios d'écran (ex. Witcher 3)
; true ou false - Par défaut (auto) est false
HUDFixRelaxedResolutionCheck=auto

; Active la capture des ressources avant l'exécution du shader.
; Augmente les chances de capture hudless mais peut capturer des ressources inutiles.
; true ou false - Par défaut (auto) est false
HUDFixImmediate=auto

; Le suivi des ressources est toujours activé indépendamment du réglage Hudfix
; Peut causer des problèmes de performance mais le désactiver peut causer des problèmes de stabilité
; true ou false - Par défaut (auto) est false
AlwaysTrackHeaps=auto

; Au lieu d'un mutex unique utiliser des shards pour le suivi des ressources
; Peut améliorer les performances sur des jeux fortement multithreadés
; true ou false - Par défaut (auto) est false
UseShards=auto

; Bloque les ressources rarement utilisées d'être utilisées comme hudless
; pour prévenir les scintillements et autres problèmes
; true ou false - Par défaut (auto) est false
ResourceBlocking=auto

; Fait une copie de Depth pour être utilisée avec l'appel Hudfix FG
; Le désactiver provoquera très probablement des artefacts occasionnels
; true ou false - Par défaut (auto) est true
MakeDepthCopy=auto

; Met à l'échelle le tampon de profondeur selon la valeur DepthScaleMax
; Corrige les informations de tampon de profondeur cassées pour DLSS-D + UE
; true ou false - Par défaut (auto) est false
EnableDepthScale=auto

; Valeur d'échelle pour EnableDepthScale
; La valeur de profondeur sera divisée par cette valeur
; float - Par défaut (auto) est 10000.0
DepthScaleMax=auto

; Fait une copie des vecteurs de mouvement pour être utilisée avec l'appel Hudfix FG
; Le désactiver provoquera très probablement des artefacts occasionnels
; true ou false - Par défaut (auto) est true
MakeMVCopy=auto

; Inverse les textures Depth & Velocity
; Cela devrait corriger les problèmes OptiFG avec les jeux Unity
; true ou false - Par défaut (auto) est false
ResourceFlip=auto

; Inverse les textures Depth & Velocity selon la zone d'interpolation
; Cela devrait corriger les problèmes OptiFG avec les jeux Unity
; true ou false - Par défaut (auto) est false
ResourceFlipOffset=auto

; Capture et échange toujours le swapchain FSR-FG 3.1 avec la sortie sélectionnée
; Cela devrait corriger le problème de double present call avec
; des jeux qui créent mais n'utilisent pas le swapchain FSR-FG (Silent Hill f)
; true ou false - Par défaut (auto) est false
AlwaysCaptureFSRFGSwapchain=auto



; -------------------------------------------------------
[Inputs]
; -------------------------------------------------------
; OptiÉchelle hookera (nvngx.dll) et utilisera les entrées Dlss
; true ou false - Par défaut (auto) est true
EnableDlssInputs=auto

; OptiÉchelle hookera (libxess.dll) et utilisera les entrées XeSS
; true ou false - Par défaut (auto) est true
EnableXeSSInputs=auto

; OptiÉchelle hookera les entrées Fsr2
; true ou false - Par défaut (auto) est true
EnableFsr2Inputs=auto

; OptiÉchelle hookera les entrées Fsr2 Dx11 au lieu de Dx12
; true ou false - Par défaut (auto) est false
UseFsr2Dx11Inputs=auto

; OptiÉchelle hookera les entrées Fsr2 Vulkan au lieu des entrées Dx11 & Dx12
; true ou false - Par défaut (auto) est false
UseFsr2VulkanInputs=auto

; OptiÉchelle utilisera les entrées Fsr2
; true ou false - Par défaut (auto) est true
UseFsr2Inputs=auto

; Essayer de trouver les méthodes FSR2 par pattern matching
; Ralentira le chargement du jeu
; true ou false - Par défaut (auto) est false
Fsr2Pattern=auto

; OptiÉchelle hookera les entrées Fsr3
; true ou false - Par défaut (auto) est true
EnableFsr3Inputs=auto

; OptiÉchelle utilisera les entrées Fsr3
; true ou false - Par défaut (auto) est true
UseFsr3Inputs=auto

; Essayer de trouver les méthodes FSR3 par pattern matching
; Ralentira le chargement du jeu
; true ou false - Par défaut (auto) est false
Fsr3Pattern=auto

; OptiÉchelle hookera l'API FidelityFX (amd_fidelityfx_dx12.dll)
; true ou false - Par défaut (auto) est true
EnableFfxInputs=auto

; OptiÉchelle utilisera les entrées API FidelityFX
; true ou false - Par défaut (auto) est true
UseFfxInputs=auto

; Active l'échange à chaud entre la mise à l'échelle FSR3.1 du jeu et la mise à l'échelle sélectionné par OptiÉchelle
; true ou false - Par défaut (auto) : false
EnableHotSwapping=auto



; -------------------------------------------------------
[FSRFGInputs]
; -------------------------------------------------------
; Ne pas utiliser Hudless défini dans ffxConfig
; true ou false - Par défaut (auto) : false
SkipConfigForHudless=auto

; Ne pas utiliser Hudless défini dans ffxDispatch
; true ou false - Par défaut (auto) : false
SkipDispatchForHudless=auto



; -------------------------------------------------------
[Framerate]
; -------------------------------------------------------
; Limite de fréquence d'images qui utilise Reflex ; le jeu doit donc prendre en charge Reflex et l'avoir activé
; Les utilisateurs AMD peuvent utiliser Fakenvapi pour activer cette fonctionnalité
; float - Par défaut (auto) : 0.0 (désactivé)
FramerateLimit=auto



; -------------------------------------------------------
[XeSS]
; -------------------------------------------------------
; Construire le pipeline pour XeSS avant l'initialisation
; true ou false - Par défaut (auto) : true
BuildPipelines=auto 

; Créer des objets heap pour XeSS avant l'initialisation
; true ou false - Par défaut (auto) : false
CreateHeaps=auto 

; Sélectionner le modèle réseau XeSS
; Actuellement cela ne semble rien faire
; 0 = KPSS | 1 = Splat | 2 = Model 3 | 3 = Model 4 | 4 = Model 5 | 5 = Model 6
; Par défaut (auto) : 0
NetworkModel=auto

; Remplacer le chemin de libxess.dll
; Exemple - D:\Downloads\OptiÉchelle\libxess.dll
; Par défaut (auto) : même dossier que le DLL du mod 
LibraryPath=auto

; Remplacer le chemin de libxess_dx11.dll
; Exemple - D:\Downloads\OptiÉchelle\libxess_dx11.dll
; Par défaut (auto) : même dossier que le DLL du mod 
Dx11LibraryPath=auto



; -------------------------------------------------------
[FSR]
; -------------------------------------------------------
; Définit la valeur verticale du FOV de la caméra pour FSR et FSR FG
; 0.0 à 180.0 - Par défaut (auto) : 60.0
VerticalFov=auto

; Si le FOV vertical n'est pas défini, sera utilisé pour calculer le FOV vertical
; 0.0 à 180.0 - Par défaut (auto) : désactivé
HorizontalFov=auto

; Définit la valeur near de la caméra pour FSR et FSR FG
; 0.0 à la valeur float max - Par défaut (auto) : 0.1
CameraNear=auto

; Définit la valeur far de la caméra pour FSR et FSR FG
; 0.0 à la valeur float max - Par défaut (auto) : 10000.0
CameraFar=auto

; Active l'utilisation des valeurs de caméra (near, far, FOV)
; reçues depuis les entrées FSR2/3 ou FFX
; true ou false - Par défaut (auto) : true
UseFsrInputValues=auto

; Active la vue Debug pour l'upscaler FSR3.X
; true ou false - Par défaut (auto) : false
DebugView=auto

; Sélectionne le backend d'upscaling pour FSR3.X/4
; 0 = FSR 4.0.2 | 1 = FSR 3.1.5 | 2 = FSR 2.3.4 
; Selon le GPU - Par défaut (auto) : 0 - FSR4 pour RDNA4, FSR3 pour les autres
UpscalerIndex=auto

; Sélectionne le backend FG pour FFX
; 0 = FSR 4.0.0 | 1 = FSR 3.1.6
; Selon le GPU - Par défaut (auto) : 0 - FSR4 pour RDNA4, FSR3 pour les autres
FGIndex=auto

; Définit le facteur de vélocité pour FSR3.1.1 et versions supérieures
; Une valeur de 0.0f peut améliorer la stabilité temporelle des pixels lumineux.
; 0.0 à 1.0 - Par défaut (auto) : 1.0
VelocityFactor=auto

; Définit l'échelle de réactivité pour FSR3.1.4 et versions supérieures
; Destiné au développement pour tester l'écriture d'une valeur plus élevée dans le masque réactif, réduit le ghosting
; 0.0 à infini - Par défaut (auto) : 1.0
ReactiveScale=auto

; Définit l'échelle d'ombrage pour FSR3.1.4 et versions supérieures
; L'augmentation de cette valeur met à l'échelle la valeur de changement d'ombrage calculée par fsr3.1 lors de la lecture pour obtenir une plus grande réactivité.
; 0.0 à infini - Par défaut (auto) : 1.0
ShadingScale=auto

; Définit l'accumulation ajoutée par image pour FSR3.1.4 et versions supérieures
; Correspond à la quantité d'accumulation ajoutée par image au niveau du pixel où une désocclusion s'est produite ou lorsque la valeur du masque réactif est > 0.0f.
; Réduire cette valeur et dessiner l'objet fantôme (c.-à-d. pas de mv) dans le masque réactif avec une valeur proche de 1.0f peut diminuer le ghosting temporel.
; Réduire cette valeur peut entraîner un scintillement de pixels fins.
; 0.0 à 1.0 - Par défaut (auto) : 0.333
AccAddPerFrame=auto

; Définit l'accumulation minimale de désocclusion pour FSR3.1.4 et versions supérieures
; Augmenter cette valeur peut réduire le scintillement temporel des pixels blancs autour d'objets fins oscillants qui se désoccluent fréquemment.
; Une valeur trop élevée peut augmenter le ghosting. Une valeur suffisamment négative signifie que pour un pixel désocclu au frame N,
; ajouter fAccumulationAddedPerFrame à partir du frame N+2.
; -1.0 à 1.0 - Par défaut (auto) : -0.333
MinDisOccAcc=auto

; Utiliser le masque réactif brut de DLSS comme masque de transparence
; true ou false - Par défaut (auto) : true
UseReactiveMaskForTransparency=auto

; Biais à appliquer au masque réactif DLSS lorsqu'il est utilisé avec FSR
; Plus la valeur est élevée, plus le biais sur la nouvelle image est important
; 0.0 - 0.9 - Par défaut (auto) : 0.45
DlssReactiveMaskBias=auto

; Active la mise à jour de FSR3.X vers FSR4
; true ou false - Par défaut (auto) : dépend du GPU - true pour RDNA4
Fsr4Update=auto

; Sélectionner le modèle FSR4 à utiliser
; 0 = Pour FSR Native AA, 1 = Ultra Quality/Quality, 2 = Balanced, 3 = Performance, 4 = DRS, 5 = Ultra Performance
; De 0 à 5 - Par défaut (auto) : valeur par défaut du jeu
Fsr4Model=auto

; Activer la visualisation Debug View de FSR4
; Peut consommer plus de VRAM
; true ou false - Par défaut (auto) : false
Fsr4EnableDebugView=auto

; Activer le watermark FSR4
; true ou false - Par défaut (auto) : false
Fsr4EnableWatermark=auto

; Indique que la ressource couleur d'entrée utilise un espace colorimétrique non linéaire
; Peut améliorer la qualité d'image de FSR4
; true ou false - Par défaut (auto) : false
FsrNonLinearColorSpace=auto

; Indique que la ressource couleur d'entrée contient des couleurs perceptuelles sRGB
; Peut améliorer la qualité d'image de FSR4
; true ou false - Par défaut (auto) : false
FsrNonLinearSRGB=auto

; Indique que la ressource couleur d'entrée contient des couleurs perceptuelles PQ
; Peut améliorer la qualité d'image de FSR4
; true ou false - Par défaut (auto) : false
FsrNonLinearPQ=auto

; Met à jour le DirectX 12 Agility SDK
; Permet l'utilisation de FSR4 sur Windows 10 dans des titres plus anciens comme Cyberpunk 2077
; VOUS DEVEZ copier le dossier D3D12_OptiÉchelle à côté de l'exécutable du jeu !
; true ou false - Par défaut (auto) : false
FsrAgilitySDKUpgrade=auto

; Remplacer le chemin de amd_fidelityfx_dx12.dll
; Exemple - C:\Program Files\Rockstar Games\Grand Theft Auto V Enhanced\Altdll\amd_fidelityfx_dx12.dll
; Par défaut (auto) : même dossier que le DLL du mod 
FfxDx12Path=auto

; Remplacer le chemin de amd_fidelityfx_vk.dll
; Exemple - D:\Downloads\OptiÉchelle\amd_fidelityfx_vk.dll
; Par défaut (auto) : même dossier que le DLL du mod 
FfxVkPath=auto



; -------------------------------------------------------
[DLSS]
; -------------------------------------------------------
; Active les appels vers le NVNGX original
; true ou false - Par défaut (auto) : true
Enabled=auto

; Remplacer le chemin de nvngx.dll / _nvngx.dll
; Par défaut (auto) : chemin défini dans le registre
LibraryPath=auto

; Chemin du dossier streamline/nvngx_dlss.dll
; Qui sera utilisé lors de l'initialisation de l'API nvngx
; par exemple .\streamline
; Par défaut (auto) : chemin du DLL OptiÉchelle
FeaturePath=auto


; Remplacer le chemin de nvngx_dlss.dll
; Exemple - D:\Downloads\OptiÉchelle\nvngx_dlss.dll
; Par défaut (auto) : override désactivé
NVNGX_DLSS_Path=auto

; Mettre sur true pour activer les remplacements personnalisés de presets de rendu
; true ou false - Par défaut (auto) : false
RenderPresetOverride=auto

; Presets de rendu pour les réglages de qualité
; Dépend de la version de DLSS, mais l'ordre le plus récent est
; 0 = Default | 1 = A | 2 = B | 3 = C | 4 = D | 5 = E | 6 = F | 7 = G 
; 8 = H | 9 = I | 10 = J | 11 = K | 12 = L | 13 = M | 14 = N | 15 = O 
; Par défaut (auto) : 0
RenderPresetForAll=auto
RenderPresetDLAA=auto
RenderPresetUltraQuality=auto
RenderPresetQuality=auto
RenderPresetBalanced=auto
RenderPresetPerformance=auto
RenderPresetUltraPerformance=auto

; Utiliser un appid générique avec NGX, corrige le non-fonctionnement du remplacement de preset OptiÉchelle avec certains jeux
; true ou false - Par défaut (auto) : false
UseGenericAppIdWithDlss=auto



; -------------------------------------------------------
[DLSSD]
; -------------------------------------------------------
; Mettre sur true pour activer les remplacements personnalisés de presets de rendu
; true ou false - Par défaut (auto) : false
RenderPresetOverride=auto

; Presets de rendu pour les réglages de qualité
; Dépend de la version DLSSD, ordre le plus récent :
; 0 = Default | 1 = A | 2 = B | 3 = C | 4 = D | 5 = E
; Par défaut (auto) : 0
RenderPresetForAll=auto
RenderPresetDLAA=auto
RenderPresetUltraQuality=auto
RenderPresetQuality=auto
RenderPresetBalanced=auto
RenderPresetPerformance=auto
RenderPresetUltraPerformance=auto



; -------------------------------------------------------
[Nukems]
; -------------------------------------------------------
; Corrige les visuels cassés dans certains jeux (principalement non-UE) sur GPU AMD sous Windows
; Peut provoquer des saccades, donc à utiliser seulement si nécessaire et mentionné
; true ou false - Par défaut (auto) : false
MakeDepthCopy=auto



; -------------------------------------------------------
[Menu]
; -------------------------------------------------------
; Active les nouveaux menus Overlay ImGui
; sans cette option OptiÉchelle désactivera toutes les fonctionnalités FG
; true ou false - Par défaut (auto) : quand OptiÉchelle est nvngx.dll false sinon true
OverlayMenu=auto

; Échelle du menu ImGui en jeu
; 0.5 à 2.0 - Par défaut (auto) : 1.0, diminue en dessous de 900p
Scale=auto

; Touche de raccourci pour ouvrir le menu
; Pour toutes les valeurs de keycode, vous pouvez consulter cette adresse
; Associer Description avec la valeur de la touche
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; Valeur entière - Par défaut (auto) : 0x2D qui correspond à VK_INSERT/touche Insert, la précédente valeur par défaut était 0x24 -> VK_HOME/touche Home
; Si vous voulez utiliser par ex. VK_BACK/touche Backspace, ce serait 0x08 - définir ShortcutKey=0x08
; -1 -> Pas de touche de raccourci
ShortcutKey=auto

; Étend les limites du ratio d'échelle à 0.1 - 6.0
; true ou false - Par défaut (auto) : false
ExtendedLimits=auto

; Utiliser une police de haute qualité pour le menu
; Peut utiliser plus de VRAM
; Si vous voyez un overlay noir ou rencontrez des plantages liés au menu avec Vulkan, essayez de désactiver
; true ou false - Par défaut (auto) : true
UseHQFont=auto

; Chemin vers une police à utiliser comme HQ Font, nécessite UseHQFont=true
; Mieux vaut utiliser des polices monospace
; Exemple de chemin : C:\\Windows\\Fonts\\comic.ttf
; Par défaut (auto) : Hack-Regular fourni avec OptiÉchelle
TTFFontPath=auto

; Désactive le message Splash au démarrage
; true ou false - Par défaut (auto) : false
DisableSplash=auto

; Active l'overlay FPS
; true ou false - Par défaut (auto) : false
ShowFps=auto

; Échelle de l'overlay FPS en jeu
; 0.5 à 2.0 - Par défaut (auto) : utilise la même échelle que le menu
FpsScale=auto

; Position de l'overlay FPS
; 0 = Haut Gauche | 1 = Haut Droite | 2 = Bas Gauche | 3 Bas Droite
; 0 à 3 - Par défaut (auto) : 0
FpsOverlayPos=auto

; Type d'overlay FPS
; 0 = Juste FPS | 1 = Simple | 2 = Detaillé | 3 = Detaillé + Graphique | 4 Complet | 5 Complet + Graphique | 6 Temps Reflex
; 0 à 6 - Par défaut (auto) : 0
FpsOverlayType=auto

; Touche de raccourci pour l'overlay FPS
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; Valeur entière - Par défaut (auto) : 0x21 -> VK_PRIOR/touche Page up
; -1 -> Pas de touche de raccourci
FpsShortcutKey=auto

; Touche de raccourci pour cycler le type d'overlay FPS
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; Valeur entière - Par défaut (auto) : 0x22 -> VK_NEXT/touche Page down
; -1 -> Pas de touche de raccourci
FpsCycleShortcutKey=auto

; Active la disposition horizontale de l'overlay FPS
; true ou false - Par défaut (auto) : false
FpsOverlayHorizontal=auto

; Alpha du fond de l'overlay FPS
; 0.0 à 1.0 - Par défaut (auto) : 0.4
FpsOverlayAlpha=auto

; Touche de raccourci pour activer/désactiver FG
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
; Valeur entière - Par défaut (auto) : 0x23 -> VK_END/touche End
; -1 -> Pas de touche de raccourci
FGShortcutKey=auto



; -------------------------------------------------------
[Spoofing]
; -------------------------------------------------------
; VendorID à usurper
; 0x10de = Nvidia | 0x8086 = Intel | 0x1002 = AMD
; Valeur entière - Par défaut (auto) : 0x10de 
SpoofedVendorId=auto

; DeviceID à usurper
; 0x2684 = 4090 | 0xE20B = B580 | 0x7550 9070 XT
; Valeur entière - Par défaut (auto) : 0x2684 (4090)
SpoofedDeviceId=auto

; VendorID cible à usurper
; Valeur entière - Par défaut (auto) : tous 
TargetVendorId=auto

; DeviceID cible à usurper
; Par défaut (auto) : tous 
TargetDeviceId=auto

; Nom du GPU usurpé
; NVIDIA GeForce RTX 4090 | Intel(R) Arc(TM) B580 Graphics | AMD Radeon RX 9070 XT
; Par défaut (auto) : NVIDIA GeForce RTX 4090
SpoofedGPUName=auto

; Active l'usurpation GPU pour Streamline, même si l'usurpation Dxgi est désactivée pour le reste du jeu
; Permet généralement d'utiliser Fakenvapi sans usurper tout le jeu, et parfois DLSS/DLSSG
; true ou false - Par défaut (auto) : true
StreamlineSpoofing=auto

; Active l'usurpation GPU Nvidia pour DXGI (peut être changé ci-dessus pour usurper d'autres vendeurs)
; true ou false - Par défaut (auto) : true pour AMD/Intel, false pour Nvidia
Dxgi=auto

; Active l'encapsulation de DxgiFactory au lieu du hooking
; Peut causer des problèmes ou aider les cartes Nvidia avec d'autres mods
; true ou false - Par défaut (auto) : false
DxgiFactoryWrapping=auto

; Ignore l'usurpation GPU DXGI lorsque la méthode appelante est dans la liste (exemple : slInit|slGetPluginFunction|nvapi_QueryInterface)
; Attention : cela désactivera l'usurpation pour le reste des appels, ne fonctionne pas non plus sur Linux
; noms de méthodes séparés par pipe "|" - Par défaut (auto) : désactivé
DxgiBlacklist=auto

; Usurper la quantité de VRAM pour DXGI
; Quantité usurpée en GB - Par défaut (auto) : désactivé
DxgiVRAM=auto

; Active l'usurpation GPU Nvidia pour Vulkan (peut être changé ci-dessus pour usurper d'autres vendeurs)
; true ou false - Par défaut (auto) : false
Vulkan=auto

; Active l'usurpation d'extensions Nvidia pour Vulkan
; true ou false - Par défaut (auto) : false
VulkanExtensionSpoofing=auto

; Usurper la quantité de VRAM pour Vulkan
; Quantité usurpée en GB - Par défaut (auto) : désactivé
VulkanVRAM=auto

; Active l'usurpation de Hardware Accelerated GPU Scheduling
; Requis pour le mod de Nukem, permet aussi aux utilisateurs RTX40xx d'utiliser DLSSG sans HAGS activé
; true ou false - Par défaut (auto) : false, sauf si le mod DLSSG est activé
SpoofHAGS=auto

; Active le remplacement du niveau de fonctionnalité D3D demandé
; true ou false - Par défaut (auto) : false
D3DFeatureLevel=auto

; Empêche l'erreur DirectX12 non supporté sur les jeux UE
; avec des cartes Intel lorsque l'usurpation est activée
; true ou false - Par défaut (auto) : false
UEIntelAtomics=auto

; Usurpe Vendor ID, Device ID et version du pilote au niveau du registre
; true ou false - Par défaut (auto) : false
Registry=auto

; Version du pilote à usurper dans le registre
; valeur chaîne - Par défaut (auto) : 32.0.15.9155 (Pour Nvidia)
RegistryDriver=auto

; Usurpe Vendor ID, Device ID au niveau de User32
; true ou false - Par défaut (auto) : false
User32=auto


; -------------------------------------------------------
[Plugins]
; -------------------------------------------------------
; Chemin qui sera recherché pour des plugins du même nom (dxgi.dll, winmm.dll, etc.)
; Par défaut : .\plugins 
Path=auto

; Permet à OptiÉchelle de charger des fichiers *.asi dans le dossier plugins
; true ou false - Par défaut (auto) : false
LoadAsiPlugins=auto

; Charge SpecialK64.dll depuis le dossier de l'exécutable du jeu
; Veuillez créer un fichier SpecialK.dxgi vide à côté de SpecialK64.dll
; pour définir le mode de fonctionnement de SpecialK, sinon il ne sera pas activé
; À CAUSE DE PROBLÈMES DE STABILITÉ, NE SERA PAS CHARGÉ LORSQUE OPTIFG EST ACTIVÉ
; true ou false - Par défaut (auto) : false
LoadSpecialK=auto

; Charge Reshade64.dll depuis le dossier de l'exécutable du jeu
; Renommez le DLL Reshade en ReShade64.dll, placez-le à côté d'OptiÉchelle et mettez sur true
; true ou false - Par défaut (auto) : false
LoadReshade=auto



; -------------------------------------------------------
[NvApi]
; -------------------------------------------------------
; Remplacer le chargement de nvapi64.dll 
; true ou false - Par défaut (auto) : false pour Nvidia, true pour les autres
OverrideNvapiDll=auto

; Désactiver FlipMetering
; Corrige le graphique frametime épais causé par le Flip Metering de Nvidia lors de l'utilisation de NukemFG, nécessite Fakenvapi pour fonctionner
; true ou false - Par défaut (auto) : false pour Nvidia, true pour les autres
DisableFlipMetering=auto

; Si l'override nvapi est activé et qu'un chemin de fichier est défini ici
; il essaiera de le charger depuis ce chemin, sinon il vérifiera le dossier courant pour nvapi64.dll
; Par défaut (auto) : dossier local
NvapiDllPath=auto

; Ne pas utiliser fakenvapi pour convertir les appels Reflex en appels XeLL sur GPU Nvidia
; Par défaut (auto) : false
DontUseFakenvapiForXeLLOnNvidia=auto



; -------------------------------------------------------
[Dx11withDx12]
; -------------------------------------------------------
; Retarder certaines opérations lors de la création des fonctionnalités D11wDx12 pour augmenter la compatibilité
; true ou false - Par défaut (auto) : false
UseDelayedInit=auto

; Préférer l'utilisation de D3D11_RESOURCE_MISC_SHARED, qui est de plus bas niveau
; et un peu plus performant et possiblement moins compatible
; true ou false - Par défaut (auto) : true
DontUseNTShared=auto



; -------------------------------------------------------
[Hooks]
; -------------------------------------------------------
; Hooking précoce des méthodes du kernel
; Peut causer des problèmes de compatibilité !!!
; true ou false - Par défaut (auto) : false
EarlyHooking=auto

; Ignorer le hooking des fichiers nvngx locaux et ne hooker que nvngx dans le registre
; Nécessaire pour Uniscaler + FG
; true ou false - Par défaut (auto) : false
HookOriginalNvngxOnly=auto

; Hooker uniquement les méthodes de ntdll.dll, ignorer kernel32.dll et kernelbase.dll
; true ou false - Par défaut (auto) : true
UseNtdllHooks=auto



; -------------------------------------------------------
[Sharpness]
; -------------------------------------------------------
; Remplacer le paramètre Sharpness de DLSS par une valeur fixe de netteté
; true ou false - Par défaut (auto) : false
OverrideSharpness=auto

; Intensité de l'accentuation,
; plage de valeurs entre 0.0 et 1.0 (la limite supérieure en utilisant RCAS est 1.3) - Par défaut (auto) : 0.3
Sharpness=auto



; -------------------------------------------------------
[OutputScaling]
; -------------------------------------------------------
; Activer l'option Output Scaling pour les backends Dx12 et Dx11 avec Dx12
; true ou false - Par défaut (auto) : false
Enabled=auto

; Ratio d'Output Scaling
; 0.5 - 3.0 - Par défaut (auto) : 1.5
Multiplier=auto

; Downscaler à utiliser pour l'Output Scaling
; 0 = FSR1 | 1 = Bicubic | 2 = Catmull-Rom | 3 = Lanczos2 | 4 = Lanczos3 | 5 = Kaiser2 | 6 = Kaiser3 | 7 = MAGIC
; 0 à 7 - Par défaut (auto) : 0 (FSR1)
Downscaler=auto



; -------------------------------------------------------
[CAS]
; -------------------------------------------------------
; Active le sharpening RCAS
; true ou false - Par défaut (auto) : false
Enabled=auto

; Activer Motion Sharpness
; true ou false - Par défaut (auto) : false
MotionSharpnessEnabled=auto

; L'accentuation sera ajoutée ou retirée selon la longueur du mouvement
; plage de valeurs entre -1.3 et 1.3 - Par défaut (auto) : 0.4
MotionSharpness=auto

; Combien un pixel doit se déplacer avant que Motion Sharpness soit appliqué
; 0.0 - 100.0 - Par défaut (auto) : 0.0
MotionThreshold=auto

; Combien un pixel doit se déplacer pour atteindre la valeur maximale de MotionSharpness
; Les valeurs entre MotionThreshold et cette valeur seront utilisées pour mettre à l'échelle la valeur de netteté
; 0.0 - 100.0 - Par défaut (auto) : 10.0
MotionScaleLimit=auto

; Activer le surlignage Debug pour Motion Sharpening
; Teinte rougeâtre pour l'augmentation, verdâtre pour la réduction de netteté
; true ou false - Par défaut (auto) : false
MotionSharpnessDebug=auto

; Activer le sharpening basé sur le contraste
; Augmente la netteté dans les zones à fort contraste.
; true ou false - Par défaut (auto) : false
ContrastEnabled=auto

; Valeur du sharpening basé sur le contraste
; Des valeurs plus élevées augmentent la netteté dans les zones à fort contraste.
; Des valeurs élevées peuvent provoquer des GLITCHES graphiques lorsqu'utilisées avec des valeurs de netteté élevées !!!
; 0.0 - 2.0  - Par défaut (auto) : 0.0
Contrast=auto



; -------------------------------------------------------
[Log]
; -------------------------------------------------------
; Fichier de log, si non défini Optiscaler.log dans le dossier courant
; Par défaut (auto) : Optiscaler.log dans le même dossier
LogFile=auto

; Niveau de verbosité des logs fichier
; 0 = Trace / 1 = Debug / 2 = Info / 3 = Warning / 4 = Error
; Par défaut (auto) : 1 = Debug
LogLevel=auto

; Log vers la console (le niveau de log est toujours 2 (Info) pour des raisons de performance)
; true ou false - Par défaut (auto) : false
LogToConsole=auto

; Log vers fichier
; true ou false - Par défaut (auto) : false
LogToFile=auto

; Log vers l'API NVNGX
; true ou false - Par défaut (auto) : false
LogToNGX=auto

; Log vers la sortie Debug
; true ou false - Par défaut (auto) : false
LogToDebug=auto

; Ouvrir une fenêtre console pour les logs
; true ou false - Par défaut (auto) : false
OpenConsole=auto

; Lorsqu'il est défini sur false, crée un nouveau fichier de log pour chaque session OptiÉchelle
; true ou false - Par défaut (auto) : true
SingleFile=auto

; Active le logging asynchrone
; true ou false - Par défaut (auto) : true
LogAsync=auto

; Threads de logging asynchrone
; 1 - 8 - Par défaut (auto) : 1
LogAsyncThreads=auto



; -------------------------------------------------------
[InitFlags]
; -------------------------------------------------------
; Forcer l'ajout de ENABLE_AUTOEXPOSURE aux flags d'initialisation
; Certains jeux Unreal Engine ont besoin de ceci, corrige les couleurs surtout dans les zones sombres
; true ou false - Par défaut (auto) : valeur DLSS
AutoExposure=auto

; Forcer l'ajout de HDR_INPUT_COLOR aux flags d'initialisation
; true ou false - Par défaut (auto) : valeur DLSS
HDR=auto

; Forcer l'ajout de INVERTED_DEPTH aux flags d'initialisation
; true ou false - Par défaut (auto) : valeur DLSS
DepthInverted=auto

; Forcer l'ajout du flag JITTERED_MV aux flags d'initialisation
; true ou false - Par défaut (auto) : valeur DLSS
JitterCancellation=auto

; Forcer l'ajout du flag HIGH_RES_MV aux flags d'initialisation
; true ou false - Par défaut (auto) : valeur DLSS
DisplayResolution=auto

; Forcer la suppression de RESPONSIVE_PIXEL_MASK des flags d'initialisation
; true ou false - Par défaut (auto) : true
DisableReactiveMask=auto



; -------------------------------------------------------
[UpscaleRatio]
; -------------------------------------------------------
; Mettre sur true pour activer l'override interne de résolution
; true ou false - Par défaut (auto) : false
UpscaleRatioOverrideEnabled=auto

; Définir la valeur forcée du ratio d'upscale
; Par défaut (auto) : 1.3
UpscaleRatioOverrideValue=auto



; -------------------------------------------------------
[QualityOverrides]
; -------------------------------------------------------
; Mettre sur true pour activer les overrides de mode qualité personnalisés
; true ou false - Par défaut (auto) : false
QualityRatioOverrideEnabled=auto

; Définir le ratio d'upscaling personnalisé pour chaque mode de qualité
;
; Valeurs par défaut (auto) :
; DLAA                    : 1.0
; Ultra Quality           : 1.3
; Quality                 : 1.5
; Balanced                : 1.7
; Performance             : 2.0
; Ultra Performance       : 3.0
QualityRatioDLAA=auto
QualityRatioUltraQuality=auto
QualityRatioQuality=auto
QualityRatioBalanced=auto
QualityRatioPerformance=auto
QualityRatioUltraPerformance=auto



; -------------------------------------------------------
[DRS]
; -------------------------------------------------------
; Mettre sur true pour limiter la résolution min DRS à la résolution de rendu
; true ou false - Par défaut (auto) : false
DrsMinOverrideEnabled=auto

; Mettre sur true pour limiter la résolution max DRS à la résolution de rendu
; true ou false - Par défaut (auto) : false
DrsMaxOverrideEnabled=auto



; -------------------------------------------------------
[HDR]
; -------------------------------------------------------
; Forcer l'espace colorimétrique HDR
; true ou false - Par défaut (auto) : false
ForceHDR=auto

; Utiliser HDR10
; DXGI_FORMAT_R10G10B10A2_UNORM au lieu de DXGI_FORMAT_R16G16B16A16_FLOAT
; true ou false - Par défaut (auto) : false
UseHDR10=auto

; Ignorer le réglage de l'espace colorimétrique HDR
; true ou false - Par défaut (auto) : false
SkipColorSpace=auto



; -------------------------------------------------------
[V-Sync]
; -------------------------------------------------------
; Activer les contrôles V-Sync
; true ou false - Par défaut (auto) : false
OverrideVsync=auto

; Forcer la valeur V-Sync
; true ou false - Par défaut (auto) : aucune sélection
ForceVsync=auto

; Valeur d'intervalle de synchronisation pour V-Sync
; 0 à 3 - Par défaut (auto) : aucune sélection
SyncInterval=auto




; -------------------------------------------------------
[Anisotropy]
; -------------------------------------------------------
; Remplacer l'Anisotropie max / Filtrage anisotrope pour les textures
; 2, 4, 8, 16 - Par défaut (auto) : désactivé
AnisotropyOverride=auto

; Changer les filtres de comparaison en filtres anisotropes
; true ou false - Par défaut (auto) : true
ModifyComparison=auto

; Changer les filtres min/max en filtres anisotropes
; true ou false - Par défaut (auto) : true
ModifyMinMax=auto

; Ignorer le remplacement sur les filtres point
; true ou false - Par défaut (auto) : true
SkipPointFilter=auto




; -------------------------------------------------------
[Mipmap]
; -------------------------------------------------------
; Remplacer la valeur du bias LOD des mipmaps
; -15.0 - 15.0 - Par défaut (auto) : désactivé
MipmapBiasOverride=auto

; Utiliser une valeur fixe pour le bias LOD
; true ou false - Par défaut (auto) : false
MipmapBiasFixedOverride=auto

; Utiliser la valeur d'override comme multiplicateur d'échelle
; true ou false - Par défaut (auto) : false
MipmapBiasScaleOverride=auto

; Remplacer le bias LOD de toutes les textures (normalement n'override que les valeurs < 0)
; true ou false - Par défaut (auto) : false
MipmapBiasOverrideAll=auto




; -------------------------------------------------------
[ProcessFilter]
; -------------------------------------------------------
; Injecter uniquement dans ce processus spécifique (insensible à la casse)
; Exemple : TargetProcessName=endfield.exe
; Par défaut (auto) : désactivé (injecte dans tous les processus)
TargetProcessName=auto

; Ne pas injecter dans ce processus spécifique (insensible à la casse)
; Noms de processus séparés par pipe "|" - Par défaut (auto) :
; crashpad_handler.exe et autres - listés dans Config.h sous ProcessFilter
ProcessExclusionList=auto




; -------------------------------------------------------
[Hotfix]
; -------------------------------------------------------
; Active la vérification de la dernière version depuis Github
; true ou false - Par défaut (auto) : true
CheckForUpdate=auto

; Active le blocage des overlays Steam et Epic
; Bloque aussi Steam Input
; true ou false - Par défaut (auto) : false, sauf pour OptiFG où c'est true
DisableOverlays=auto

; Lors de l'utilisation du mod Luma et si la mise à jour Agility est activée
; OptiÉchelle retardera le chargement de Reshade et créera d'abord un device D3D12 pour Luma
; Cette option empêchera la création du device D3D12 pour le mod Luma
; true ou false - Par défaut (auto) : false
DontCreateD3D12DeviceForLuma=auto

; OptiÉchelle tentera de forcer le GPU Haute Performance
; true ou false - Par défaut (auto) : false
PreferDedicatedGpu=auto

; OptiÉchelle ne rapportera que le premier GPU Haute Performance
; true ou false - Par défaut (auto) : false
PreferFirstDedicatedGpu=auto

; Arrondit la largeur et la hauteur des résolutions internes au multiple de cette valeur
; 2, 4, 8, 16 ...  - Par défaut (auto) : désactivé
RoundInternalResolution=auto

; Ignore l'upscaling des n premières images
; n est un entier - Par défaut (auto) : désactivé
SkipFirstFrames=auto

; Restaurer la dernière signature compute utilisée après l'upscaling
; true ou false - Par défaut (auto) : false
RestoreComputeSignature=auto

; Restaurer la dernière signature graphique utilisée après l'upscaling
; true ou false - Par défaut (auto) : false
RestoreGraphicSignature=auto

; Utiliser des shaders précompilés pour RCAS, Output Scaling et Mask Bias
; true ou false - Par défaut (auto) : true
UsePrecompiledShaders=auto

; État de la ressource texture couleur pour corriger les couleurs arc-en-ciel sur les cartes AMD (principalement pour les jeux UE)
; Pour les jeux sur moteur UE avec AMD, définir Color à 4 (D3D12_RESOURCE_STATE_RENDER_TARGET)
ColorResourceBarrier=auto
; Pour les jeux sur moteur UE avec AMD, définir MotionVector à 8 (D3D12_RESOURCE_STATE_UNORDERED_ACCESS)
MotionVectorResourceBarrier=auto
DepthResourceBarrier=auto
ColorMaskResourceBarrier=auto
ExposureResourceBarrier=auto
OutputResourceBarrier=auto

; Par défaut (auto) : correction d'état désactivée
; Ces paramètres définissent l'état initial de chaque ressource
; et ajoutent une barrière de ressource pour l'état correct
;
; États communs des barrières de ressource
; ----------------------------------------------------
; D3D12_RESOURCE_STATE_COMMON = 0,
; D3D12_RESOURCE_STATE_VERTEX_AND_CONSTANT_BUFFER = 1,
; D3D12_RESOURCE_STATE_INDEX_BUFFER = 2,
; D3D12_RESOURCE_STATE_RENDER_TARGET = 4,
; D3D12_RESOURCE_STATE_UNORDERED_ACCESS = 8,
; D3D12_RESOURCE_STATE_DEPTH_WRITE = 16,
; D3D12_RESOURCE_STATE_DEPTH_READ = 32,
; D3D12_RESOURCE_STATE_NON_PIXEL_SHADER_RESOURCE = 64,
; D3D12_RESOURCE_STATE_PIXEL_SHADER_RESOURCE = 128,
;------------------------------------------------------
; 
; Toutes les valeurs d'état peuvent être vérifiées ici
; https://learn.microsoft.com/en-us/windows/win32/api/d3d12/ne-d3d12-d3d12_resource_states